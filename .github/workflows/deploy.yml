name: Deploy Custom Blog

on:
  push:
    branches:
      - main  # 메인 브랜치에 코드가 올라올 때마다 작동

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Build Script (Convert MD to HTML)
        run: node build.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.name "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Build: Convert Markdown to HTML" || echo "No changes to commit"
          
          # 💡 원격 변경 사항을 먼저 가져와 병합한 뒤 푸시합니다.
          git pull --rebase origin main
          git push origin main
