def calculate_circle_area(radius):
    &quot;&quot;&quot;원의 넓이를 계산하여 반환합니다.&quot;&quot;&quot;
    if radius &lt; 0:
        raise ValueError(&quot;반지름은 음수일 수 없습니다.&quot;)
        
    return math.pi * (radius ** 2)
